<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 40px 16px;
      font-family: sans-serif;
      background: #f0f0f0;
      box-sizing: border-box;
    }

    h1 {
      color: #333;
      margin-bottom: 32px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 24px;
      width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      color: #333;
    }

    .card p {
      margin: 0 0 16px;
      font-size: 0.9rem;
      color: #666;
    }

    button {
      padding: 12px 24px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
    }

    button:hover {
      background: #357abd;
    }

    .output {
      margin-top: 16px;
      font-size: 1rem;
      font-weight: bold;
      color: #333;
      min-height: 2.5rem;
    }
  </style>
</head>
<body>
  <h1>Test-Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2>Hello World</h2>
      <p>Grundlegender Test der Deployment-Pipeline.</p>
      <button onclick="testHelloWorld()">Klick mich!</button>
      <div class="output" id="output-hello-world"></div>
    </div>

    <div class="card">
      <h2>Datenbankverbindung</h2>
      <p>Prüft die Verbindung zur Datenbank.</p>
      <button onclick="testDatabase()">Testen</button>
      <div class="output" id="output-database"></div>
    </div>

    <div class="card">
      <h2>Instagram-Verbindung</h2>
      <p>Prüft die Verbindung zur Instagram-API.</p>
      <button onclick="testInstagram()">Testen</button>
      <div class="output" id="output-instagram"></div>
    </div>
  </div>

  <script>
    const NOT_IMPLEMENTED = '⏳ Noch nicht implementiert';

    function testHelloWorld() {
      document.getElementById('output-hello-world').innerHTML =
        'Hello World!<br>automatically deployed from develop-branch to staging-environment<br>and master-branch to production-environment.';
    }

    function testDatabase() {
      document.getElementById('output-database').innerHTML = NOT_IMPLEMENTED;
    }

    function testInstagram() {
      document.getElementById('output-instagram').innerHTML = NOT_IMPLEMENTED;
    }
  </script>
</body>
</html>
