<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
    }

    button {
      padding: 16px 32px;
      font-size: 1.2rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
    }

    button:hover {
      background: #357abd;
    }

    #output {
      margin-top: 24px;
      font-size: 2rem;
      font-weight: bold;
      color: #333;
      min-height: 2.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <button onclick="document.getElementById('output').innerHTML = 'Hello World!<br>automatically deployed from develop-branch to staging-environment<br>and master-branch to production-environment.'">
    Klick mich!
  </button>
  <div id="output"></div>
</body>
</html>
